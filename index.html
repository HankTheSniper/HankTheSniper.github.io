<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵汉卿 | 游戏策划</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 主场景容器 — 16:9 比例 -->
    <div class="scene" id="scene">

        <!-- ======== 背景层 ======== -->
        <!-- 右侧深色平行四边形 -->
        <div class="bg-parallelogram"></div>

        <!-- ======== 人物照片层 ======== -->
        <img class="portrait" src="assets/me.png" alt="赵汉卿">

        <!-- ======== 左上角"热爱"标签 ======== -->
        <div class="label-chip label-passion" data-anim="left">
            <span>热爱</span>
        </div>

        <!-- ======== 右侧技能标签列（斜线扫过时浮现） ======== -->
        <div class="skill-sidebar">
            <span class="skill-tag" data-sweep="1">玩法</span>
            <span class="skill-tag" data-sweep="2">文案</span>
            <span class="skill-tag" data-sweep="3">美术</span>
            <span class="skill-tag" data-sweep="4">开发</span>
            <span class="skill-tag" data-sweep="5">智能体</span>
            <span class="skill-tag" data-sweep="6">信息安全</span>
        </div>

        <!-- ======== 中部：箭头 + "游戏策划"（领头） ======== -->
        <div class="hero-banner" data-anim="left">
            <div class="hero-arrow">
                <svg viewBox="0 0 800 200" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#D52B1E" stop-opacity="0.3"/>
                            <stop offset="100%" stop-color="#D52B1E" stop-opacity="1"/>
                        </linearGradient>
                    </defs>
                    <polygon points="0,0 800,0 800,200 40,200 0,100" fill="url(#arrowGrad)"/>
                </svg>
            </div>
            <div class="hero-text">游戏策划</div>
        </div>

        <!-- ======== 名字方块背景（深色底） ======== -->
        <div class="name-bg" data-anim="up"></div>

        <!-- ======== 名字文字 ======== -->
        <div class="name-block" data-anim="up">
            <span class="name-text">赵汉卿</span>
        </div>

        <!-- ======== 教育信息 ======== -->
        <div class="education" data-anim="fade">
            <span>济南大学 | 计科 | 硕士</span>
        </div>

        <!-- ======== 各标签组（方块+文字一体） ======== -->
        <div class="label-chip label-competition" data-anim="left">
            <span>参赛经验</span>
        </div>

        <div class="label-chip label-org" data-anim="right">
            <span>组织、协调、沟通</span>
        </div>

        <div class="label-chip label-analysis" data-anim="left">
            <span>游戏理解与分析</span>
        </div>

        <div class="label-chip label-code" data-anim="left">
            <span>代码能力</span>
        </div>

        <div class="label-chip label-art" data-anim="right">
            <span>绘画与审美</span>
        </div>

        <div class="label-chip label-humanities" data-anim="up">
            <span>历史、文学、哲学</span>
        </div>

        <div class="label-chip label-tools" data-anim="right">
            <span>熟练使用脑图、流程图</span>
            <span>、Office、Github等工具</span>
        </div>

        <!-- ======== 联系方式 ======== -->
        <div class="contact-bar" data-anim="up">
            <span>Email: hankzhao1999@163.com</span>
            <span class="contact-sep">|</span>
            <span>Tel: 15833356058</span>
        </div>

        <!-- ======== SVG 斜线扫掠层 ======== -->
        <svg class="sweep-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <line id="sweepLine"
                  x1="82" y1="0" x2="100" y2="0"
                  stroke="#D52B1E"
                  stroke-width="0.15"
                  opacity="0"/>
        </svg>

        <!-- ======== 最终浮现图片 ======== -->
        <img class="overlay-nl" src="assets/nl.png" alt="" data-anim="fade" data-final="true">

    </div>

    <script src="js/main.js"></script>
</body>
</html>
